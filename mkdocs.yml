site_name: Azure Functions OpenAPI
site_description: OpenAPI (Swagger) integration for Python-based Azure Functions
site_author: Yeongseon Choe
site_url: https://yeongseon.github.io/azure-functions-openapi-python/
repo_url: https://github.com/yeongseon/azure-functions-openapi-python
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/logo.png
  favicon: images/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: getting-started.md
      - Configuration: configuration.md
  - User Guide:
      - Usage: usage.md
      - CLI: cli.md
      - Route Prefix: route-prefix.md
      - Architecture: architecture.md
  - Deployment:
      - Choose a Plan: choose-a-plan.md
      - Deploy to Azure: deployment.md
  - Examples:
      - Webhook Receiver: examples/webhook_receiver.md
      - Report Jobs: examples/report_jobs.md
      - Notification Request: examples/notification_request.md
      - Partner Import Bridge: examples/partner_import_bridge.md
  - API Reference: api.md
  - Contributing:
      - Development: development.md
      - Testing: testing.md
      - Guidelines: contributing.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Security: security.md
  - Release Process: release_process.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Allow docs pages to embed files from the repo root (e.g. CHANGELOG.md)
      # so there is a single source of truth for the changelog.
      base_path: ["."]
      check_paths: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_signature: true
            show_root_full_path: false
            merge_init_into_class: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-functions-openapi-python
  copyright: |
    © 2026 Yeongseon Choe – MIT Licensed

extra_javascript:
  - https://unpkg.com/mermaid@11.14.0/dist/mermaid.min.js
  - javascripts/mermaid-init.js
